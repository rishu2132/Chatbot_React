<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot</title>
		<style>
			body{
				font-family: Arial, Helvetica, sans-serif;
			}

			.send-button {
				background-color: rgb(25,135,84);
				color: white;
				padding: 12px 20px;
				margin-left: 10px;
				border: none;
				border-radius: 10px;
				font-size: 15px;
				cursor: pointer;
			}

			.chat-input {
				padding: 12px 15px;
				border-radius: 10px;
				border-width: 1px;
				font-size: 15px;
				flex-grow: 1;
			}

			.chat-input-container{
				display: flex;
				margin-bottom: 60px;
			}

			.app-container{
				max-width: 600px;
				margin-left: auto;
				margin-right: auto;

				height:100vh;
				display: flex;
				flex-direction: column;
			}

			.user-message {
				display: flex;
				justify-content: end;
				margin-bottom: 10px;
				align-items: start;
			}

			.robot-message{
				display: flex;
				justify-content: start;
				margin-bottom: 10px;
				align-items: start;
			}

			.chat-message-text{
				background-color: rgb(238,238,238);

				display: flex;
				align-items: center;
				padding: 15px 20px;
				margin-left: 10px;
				margin-right: 10px;
				border: none;
				border-radius: 10px;
				max-width: 300px;
			}

			.chat-message-profile{
				width: 45px;
			}

			.chat-messages-container {
				flex-grow: 1;
				margin-top: 20px;
				overflow: scroll;
				scrollbar-width: none;
			}

			.app-container p {
				text-align: center;
				color: rgb(200,200,200);
				font-size: 15px;
			}
		</style>
</head>
<body>
    <div class="js-container"></div>

		<script src="https://unpkg.com/supersimpledev/dayjs.js"></script>
        <script src="https://unpkg.com/supersimpledev/react.js"></script>
        <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

        <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

        <script src="https://unpkg.com/supersimpledev/babel.js"></script>
        <script type="text/babel">
			
            // creating components
            
            function ChatInput({ chatMessages, setChatMessages }){
                const [inputText, setInputText] = React.useState('');
								const [isLoading , setIsLoading]= React.useState(false);

                function saveInputText(event){
                    setInputText(event.target.value);
                }

                function eventCheck(event){
                    const buttonPressed = event.key;
                    
                    event.key === "Enter" && sendMessage();
                    event.key === "Escape" && setInputText('');
                    
                }

                async function sendMessage(){
									if (isLoading || inputText ===''){
										return;
									}

									setInputText('');

									const newChatMessages = [
											...chatMessages,
											{
													message: inputText,
													sender: 'user',
													id: crypto.randomUUID()
											}
									];

									setChatMessages([
											...chatMessages,
											{
												message: 'Loading...',
												sender:'robot',
												id: crypto.randomUUID()
											}
									]);

									
									// controlled input --> clears out the input 
									

									const response = await Chatbot.getResponseAsync(inputText);
									
									setChatMessages([
											...newChatMessages,
											{
													message: response,
													sender: 'robot',
													id: crypto.randomUUID()
											}
									]);
									
                   setIsLoading(false);

                }

                return ( 
                    <div className="chat-input-container">
                        <input 
													placeholder="Send a message to Chatbot" 
													size="30"
													onChange={saveInputText}
													value = {inputText}
													onKeyDown={eventCheck}
													className="chat-input"
                        />
                        <button 
													onClick={sendMessage}
													className="send-button"      // in react , for css instead of using class for the class we use className as class is reserved for js
												>Send</button>
                    </div>
                );
            }

            function ChatMessage({ message , sender }){
                return (
                    <div className={ sender==="robot"? 'robot-message' : 'user-message' }>
                        {sender === 'robot' && <img src="./images/robot.png" className="chat-message-profile"/>}
                        <div className="chat-message-text">{message}</div>
                        {sender === 'user' && <img src="./images/user.png" className="chat-message-profile"/>}
                    </div>
                );
            }


            function ChatMessages({ chatMessages }){          //! convert chatmessages to state
						// use Effect run some code after the component is created or updated
							const chatMessagesRef = React.useRef(null);

							React.useEffect(() => {
								const containerElem = chatMessagesRef.current;
								if (containerElem){
									containerElem.scrollTop = containerElem.scrollHeight;
									
								}
							}, [chatMessages])
							return(
									<div className="chat-messages-container" ref={chatMessagesRef}>

											{chatMessages.map((chatMessage) => {
													return (
															<ChatMessage 
																	message={chatMessage.message}
																	sender= {chatMessage.sender}
																	key={chatMessage.id}
															/>
													);
											})}
									</div>
							);
            }


            function App(){
                // Lifting the state up
                // Array destructuring
                const [chatMessages, setChatMessages]= React.useState([]);
                // const chatMessages = array[0];   // current value of data
                // const setChatMessages = array[1];   // update the data so that it can render in html. { updater function }

                return(
                    <div className="app-container">
											
											<ChatMessages 
													chatMessages = {chatMessages}
											/>
											<ChatInput 
													chatMessages={chatMessages}
													setChatMessages= {setChatMessages}
											/>
											<p>{chatMessages.length === 0 ? 'Welcome to the chatbot project! Send a message using the textbox below.' : ''}</p>
											
                    </div>
                );
            }
        
		


            const container = document.querySelector('.js-container');
            ReactDOM.createRoot(container).render(<App/>);
        </script>
    
</body>
</html>
