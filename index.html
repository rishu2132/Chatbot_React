<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot</title>
</head>
<body>
    <div class="js-container"></div>

		<script src="https://unpkg.com/supersimpledev/dayjs.js"></script>
        <script src="https://unpkg.com/supersimpledev/react.js"></script>
        <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

        <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

        <script src="https://unpkg.com/supersimpledev/babel.js"></script>
        <script type="text/babel">
			
            // creating components
            
            function ChatInput({ chatMessages, setChatMessages }){
                const [inputText, setInputText] = React.useState('');
								const [isLoading , setIsLoading]= React.useState(false);

                function saveInputText(event){
                    setInputText(event.target.value);
                }

                function eventCheck(event){
                    const buttonPressed = event.key;
                    
                    event.key === "Enter" && sendMessage();
                    event.key === "Escape" && setInputText('');
                    
                }

                async function sendMessage(){
									if (isLoading || inputText ===''){
										return;
									}

									setInputText('');

									const newChatMessages = [
											...chatMessages,
											{
													message: inputText,
													sender: 'user',
													id: crypto.randomUUID()
											}
									];

									setChatMessages([
											...chatMessages,
											{
												message: 'Loading...',
												sender:'robot',
												id: crypto.randomUUID()
											}
									]);

									
									// controlled input --> clears out the input 
									

									const response = await Chatbot.getResponseAsync(inputText);
									
									setChatMessages([
											...newChatMessages,
											{
													message: response,
													sender: 'robot',
													id: crypto.randomUUID()
											}
									]);
									
                   setIsLoading(false);

                }

                return ( 
                    <>
                        <input 
                            placeholder="Send a message to Chatbot" 
                            size="30"
                            onChange={saveInputText}
                            value = {inputText}
                            onKeyDown={eventCheck}
                        />
                        <button onClick={sendMessage}>Send</button>
                    </>
                );
            }

            function ChatMessage({ message , sender }){
                return (
                    <div>
                        {sender === 'robot' && <img src="./images/robot.png" width="50"/>}
                        {message}
                        {sender === 'user' && <img src="./images/user.png" width="50"/>}
                    </div>
                );
            }


            function ChatMessages({ chatMessages }){          //! convert chatmessages to state
           
                return(
                    <>

                        {chatMessages.map((chatMessage) => {
                            return (
                                <ChatMessage 
                                    message={chatMessage.message}
                                    sender= {chatMessage.sender}
                                    key={chatMessage.id}
                                />
                            );
                        })}
                    </>
                );
            }


            function App(){
                // Lifting the state up
                // Array destructuring
                const [chatMessages, setChatMessages]= React.useState([{
                        message: 'Hello chatbot',
                        sender: 'user',
                        id:'id1'
                    },{
                        message: 'Hello! How can I help you?',
                        sender: 'robot',
                        id:'id2'
                    },{
                        message: 'Can you get me todays date?',
                        sender: 'user',
                        id:'id3'
                    },{
                        message: 'Today is april 4',
                        sender: 'robot',
                        id:'id4'
                    }]);
                // const chatMessages = array[0];   // current value of data
                // const setChatMessages = array[1];   // update the data so that it can render in html. { updater function }

                return(
                    <>
                    <ChatInput 
                        chatMessages={chatMessages}
                        setChatMessages= {setChatMessages}
                    />
                    <ChatMessages 
                        chatMessages = {chatMessages}
                    />
                    </>
                );
            }
        
		


            const container = document.querySelector('.js-container');
            ReactDOM.createRoot(container).render(<App/>);
        </script>
    
</body>
</html>
